<style>
/* ---------- BODY / GRADIENT ---------- */
:root{
  --accent1: #8f7bff;
  --accent2: #a89bff;
  --accent3: #c9c2ff;
  --accent4: #e6e3ff;
  --white: #ffffff;
  --card-bg: #ffffff;
  --muted: rgba(0,0,0,0.55);
}

*{box-sizing:border-box}
html, body{
margin:0;
padding:0;
height:100%;
	overflow:hidden;
	overscroll-behavior:none;
background:#8f7bff;
}

body{
padding-top: env(safe-area-inset-top);
min-height:100dvh;
font-family: "Segoe UI", Roboto, Arial, sans-serif;
color:#111;

background: linear-gradient(
180deg,
var(--accent1) 0%,
var(--accent2) 25%,
var(--accent3) 55%,
var(--accent4) 80%,
var(--white) 100%
);

-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}

html{
touch-action: manipulation;
}
/* ---------- APP LAYOUT ---------- */
.app{
max-width:420px;
margin:0 auto;
padding:22px;
padding-bottom:160px;

height:100dvh;

position:relative;

overflow-y:auto;
-webkit-overflow-scrolling:touch;
}
.bottomControls{
position:fixed;

left:0;
right:0;
bottom:0;

padding:16px;

display:flex;
flex-direction:column;
gap:12px;

max-width:420px;
margin:auto;

background:linear-gradient(
to top,
rgba(230,227,255,0.95),
rgba(230,227,255,0)
);

backdrop-filter:blur(10px);
}
/* ---------- HEADER ---------- */
.header{
  font-size:20px;
  font-weight:600;
  text-align:center;
  margin:50px 0 14px;
  color:#1b1635;
}

/* ---------- STATS ---------- */
.stats{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  padding:12px 14px;
  border-radius:14px;
  margin-bottom:18px;
  font-size:14px;
  color: #14121a;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}
.stats .left{display:flex;gap:10px;align-items:center}
.stats .stat{
  background: rgba(255,255,255,0.25);
  padding:6px 10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  align-items:center;
  font-size:13px;
  color:#0b0720;
  box-shadow: 0 6px 18px rgba(43,24,120,0.06);
}

/* ---------- CARD ---------- */
.card{
background: var(--card-bg);
color:#222;
border-radius:20px;
padding:20px;
text-align:center;
font-size:28px;
font-weight:600;
margin-bottom:18px;
box-shadow:0 18px 40px rgba(51,41,112,0.08);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

/* animation helper (apply when switching card) */
.card.animate {
  transform: translateY(-8px);
  opacity: 0.85;
}

/* ---------- NAV BUTTONS (Prev/Next) ---------- */
.navButtons{
display:flex;
gap:12px;
}
.navButtons button{
  flex:1;
  min-height:48px;
  border-radius:28px;
  font-size:14px;
margin-top: 10px;
}

/* ---------- BUTTONS ---------- */
button{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:28px;
  margin-top:10px;
  font-size:15px;
  cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  box-shadow: 0 6px 18px rgba(99,58,255,0.08);
}
button:active{ transform: translateY(1px); }

	.bigButton{
min-height:60px;
font-size:18px;
}

.primary{
  background: linear-gradient(135deg,#7b5cff,#9f7bff);
  color:white;
  font-weight:600;
margin-top: 10px;
}

.secondary{
  background: #ffffff;
  color: #6a4bff;
  font-weight:600;
}
.topButtons{
position:absolute;
top:12px;
left:22px;
right:22px;
display:flex;
justify-content:space-between;
gap:12px;
z-index:20;
}

.iconBtn{

width:42px;
height:42px;
border-radius:12px;
border:none;
font-size:22px;
background:rgba(255,255,255,0.25);
backdrop-filter: blur(6px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* ---------- LIST ---------- */
.listItem{
  background:#fff;
  color:#222;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  box-shadow: 0 8px 22px rgba(31,20,100,0.04);
}
.listItem .text { flex:1 }
.smallBtn{
  width:auto;
  padding:8px 12px;
  font-size:13px;
  border-radius:10px;
  margin-left:6px;
}

/* ---------- INPUT ---------- */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  font-size:15px;
  box-shadow: 0 8px 16px rgba(17,12,30,0.03);
}

/* ---------- VIEW CONTROL ---------- */
.view{ display:none; }
.active{ display:block; }

/* ---------- MODAL (EDIT) ---------- */
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(10,8,20,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.modal-backdrop.show{
  display:flex;
}
.modal{
  width:90%;
  max-width:420px;
  background: #fff;
  color:#111;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 18px 50px rgba(14,9,40,0.4);
}
.modal h3{ margin:0 0 8px 0 }
.modal .row{ margin-bottom:8px }

/* small responsive tweaks */
@media (max-width:420px){
  .card{ padding:36px 14px; font-size:22px }
  .header{ font-size:18px }
  .stats{ font-size:13px }
}

.card{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.speak{
  cursor:pointer;
  font-size:26px;
}
.record,
.play{
  cursor:pointer;
  font-size:24px;
}
	#imageResults{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin:10px 0;
}
#imageResults img {
width:100%;
	border-radius:10px;
	cursor:pointer;
}
	#imageResults img:hover {
transform:scale(1.05);

}
	#cardImage{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:16px;
margin-bottom:10px;
}
.modeBtn{
padding:8px 14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.3);
font-weight:600;
}
	#startScreen{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
180deg,
#8f7bff,
#c9c2ff
);

z-index:9999;

color:white;
text-align:center;
}

.startContent h1{
font-size:38px;
margin:0;
}

.tapText{
margin-top:20px;
opacity:0.8;
font-size:14px;
}
	.logo{
font-size:20px;
		max-width:90px;
}
.logoFish{
width:80px;
height:auto;

margin-top:20px;

<body>

<div class="app">
  <div class="header"></div>
  <div class="topButtons">

<button class="iconBtn left" onclick="goToList()">📋</button>

<button class="modeBtn" onclick="setMode('ALL')">ALL</button>

<div class="tiles">

<div class="tile" onclick="openAll()">
📚
<span>Fiszki</span>
</div>

</div>

 <div id="add" class="view">

<script>


/* ===============================
   INDEXED DB
================================ */

let db
let cards = []
let currentIndex = 0
let showingAnswer = false
let sortAZ = true
let study= "SRS"
let mediaRecorder
let audioChunks = []
let recordedAudioBase64 = null

let imageURL = null
let streak = localStorage.getItem("streak") || 0
let lastStudy = localStorage.getItem("lastStudy") || 0

const request = indexedDB.open("FlashcardsDB",1)


request.onupgradeneeded = function(event){

db = event.target.result

db.createObjectStore("cards",{keyPath:"id",autoIncrement:true})

}


request.onsuccess = function(event){

db = event.target.result

loadCardsFromDB()

}

/* ===============================
TOUCH SYSTEM (SWIPE + TAP)
================================ */

const swipeArea = document.querySelector(".app")

let startX = 0
let startY = 0
let endX = 0
let endY = 0

swipeArea.addEventListener("touchstart", e => {

if(e.target.tagName === "BUTTON") return

startX = e.touches[0].clientX
startY = e.touches[0].clientY

})

swipeArea.addEventListener("touchend", e => {

if(e.target.tagName === "BUTTON") return

endX = e.changedTouches[0].clientX
endY = e.changedTouches[0].clientY

handleGesture()

})

function handleGesture(){
if(!document.getElementById("home").classList.contains("active")) return
const diffX = endX - startX
const diffY = endY - startY

/* TAP */

if(Math.abs(diffX) < 30 && Math.abs(diffY) < 80){
showAnswer()
return
}

/* SWIPE */

if(Math.abs(diffX) > Math.abs(diffY)){

if(diffX > 80){
prevCard()
return
}

if(diffX < -80){
nextCard()
return
}

}

}
/* ===============================
   mood
================================ */
function setMode(mode){

studyMode = mode

currentIndex = 0

renderCard()

}

	
/* ===============================
   LOAD FROM DB
================================ */

function loadCardsFromDB(callback){

const transaction = db.transaction("cards","readonly")

const store = transaction.objectStore("cards")

const req = store.getAll()

req.onsuccess = function(){

cards = req.result

renderCard()

if(callback) callback()

}

}


/* ===============================
   NAVIGATION
================================ */

function goHome(){ setView("home") }
function goToList(){ setView("list"); renderList() }
function goToAdd(){ setView("add") }

function setView(view){

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))

document.getElementById(view).classList.add("active")

}


/* ===============================
   RENDER CARD
================================ */
const cardEl = document.getElementById("cardText")
let dueCards = [];
function renderCard(){

  // filtrujemy fiszki do powtórki
 if(studyMode === "ALL"){

dueCards = cards

}else{

dueCards = cards.filter(c => !c.nextReview || c.nextReview <= Date.now())

}

  // jeśli brak wszystkich fiszek
  if(cards.length === 0){
    currentIndex = 0;
    cardEl.innerText = "Dodaj pierwszą fiszkę";
    document.getElementById("counter").innerText = 0;
    document.getElementById("progress-mini").innerText = "—";
    document.getElementById("cardImage").style.display = "none";
    return;
  }

  // jeśli brak fiszek do powtórki
  if(dueCards.length === 0){
    currentIndex = 0;
    cardEl.innerText = "Brak fiszek do powtórki 🎉";
    document.getElementById("progress-mini").innerText = "0 / 0";
    document.getElementById("cardImage").style.display = "none";
    return;
  }

  // zabezpieczenie indexu
  if(currentIndex >= dueCards.length){
    currentIndex = 0;
  }

  const card = dueCards[currentIndex];

  // tekst fiszki
  cardEl.innerText = showingAnswer ? card.back : card.front;

  // licznik
  document.getElementById("counter").innerText = cards.length;

  // progres
  document.getElementById("progress-mini").innerText =
    (currentIndex + 1) + " / " + dueCards.length;

  // obrazek
  const img = document.getElementById("cardImage");

  if(card.image){
    img.src = card.image;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
const reviewUI = document.getElementById("reviewButtons")

if(studyMode === "ALL"){
reviewUI.style.display = "none"
}
else{
reviewUI.style.display = "block"
}
}

function reviewCard(score){
	updateStreak()
  const card = dueCards[currentIndex];
  const intervals = [1, 3, 7, 14, 30]; // dni
  if(score === 0){
    card.level = 0; // reset do nauki
  } else {
    card.level = Math.min(card.level + 1, intervals.length - 1);
  }
  card.nextReview = Date.now() + intervals[card.level] * 24*60*60*1000;
  const transaction = db.transaction("cards","readwrite");
  transaction.objectStore("cards").put(card);
  transaction.oncomplete = () => {
    nextCard();
  };
}

function nextCard(){
  if(dueCards.length === 0) return;
  currentIndex = (currentIndex + 1) % dueCards.length;
  showingAnswer = false;
  renderCard();
}
function prevCard(){
  if(dueCards.length === 0) return;
  currentIndex = (currentIndex - 1 + dueCards.length) % dueCards.length;
  showingAnswer = false;
  renderCard();
}


/* ===============================
   STUDY
================================ */

function showAnswer(){

if(cards.length===0) return

// toggle
showingAnswer = !showingAnswer

renderCard()

}



/* ===============================
   ADD CARD
================================ */

function addCard(){
if(mediaRecorder && mediaRecorder.state === "recording"){
alert("Nagranie jeszcze trwa")
return
}

if(audioChunks.length > 0 && !recordedAudioBase64){
alert("Poczekaj aż nagranie się zapisze")
return
}
const front = document.getElementById("frontInput").value.trim()
const back = document.getElementById("backInput").value.trim()

if(!front || !back){
alert("Wypełnij pola")
return
}

// debug
console.log("Audio przed zapisem:", recordedAudioBase64)

const newCard={
front:front,
back:back,
audio: recordedAudioBase64 || null,
image:imageURL || null,
level:0,
nextReview:Date.now()
}
	

const transaction = db.transaction("cards","readwrite")
const store = transaction.objectStore("cards")
console.log("Audio zapisane w fiszce:", recordedAudioBase64)
store.add(newCard)

transaction.oncomplete = function(){

// reset
recordedAudioBase64 = null
imageURL = null

document.getElementById("frontInput").value=""
document.getElementById("backInput").value=""
document.getElementById("imageResults").innerHTML=""

currentIndex = 0

loadCardsFromDB()

showPopup("Fiszka dodana ✅")

}

}

async function compressImage(file, quality = 0.6){
  const imageBitmap = await createImageBitmap(file);
  const canvas = document.createElement('canvas');

  const maxWidth = 800;
  let width = imageBitmap.width;
  let height = imageBitmap.height;

  if(width > maxWidth){
    height = height * (maxWidth / width);
    width = maxWidth;
  }

  canvas.width = width;
  canvas.height = height;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(imageBitmap, 0, 0, width, height);

  const blob = await new Promise(resolve =>
    canvas.toBlob(resolve, 'image/jpeg', quality)
  );

  return new Promise(res => {
    const reader = new FileReader();
    reader.onloadend = () => res(reader.result);
    reader.readAsDataURL(blob);
  });
}



let searchTimer

document.getElementById("frontInput").addEventListener("input", () => {

clearTimeout(searchTimer)
searchTimer = setTimeout(searchImages, 500)

})

async function searchImages(){

const word = document.getElementById("frontInput").value.trim().split(" ")[0]

if(word.length < 2) return

const container = document.getElementById("imageResults")

container.innerHTML = "Ładowanie..."

try{

const url = "https://api.unsplash.com/search/photos?query=" + encodeURIComponent(word) + "&per_page=6&client_id=OEb7Rnzbk16GOQ4M4z3089WGIquXpS8PvWoQH4zpY8w"

const res = await fetch(url)

if(!res.ok){
container.innerHTML = "Błąd API Unsplash"
return
}

const data = await res.json()

container.innerHTML = ""

if(!data.results || data.results.length === 0){

const img = document.createElement("img")
img.src = "https://picsum.photos/300"

container.appendChild(img)
return

}

data.results.forEach(photo=>{

const img = document.createElement("img")
img.src = photo.urls.small

img.onclick = ()=>{

imageURL = photo.urls.small

document.querySelectorAll("#imageResults img").forEach(i=>i.style.border="none")

img.style.border = "3px solid #7b5cff"

}

container.appendChild(img)

})

}catch(err){

container.innerHTML = "Błąd pobierania obrazów"

}

}


document.getElementById("imageUpload").addEventListener("change", async function(e){

const file = e.target.files[0]

if(!file) return

// kompresujemy obraz
imageURL = await compressImage(file, 0.6)

const container = document.getElementById("imageResults")

container.innerHTML = ""

const img = document.createElement("img")

img.src = imageURL
img.style.border = "3px solid #7b5cff"

container.appendChild(img)

})



	
/* ===============================
   DELETE
================================ */
function deleteCard(index){
  if(!confirm("Usunąć fiszkę?")) return;
  const id = cards[index].id;
  const transaction = db.transaction("cards","readwrite");
  transaction.objectStore("cards").delete(id);
  transaction.oncomplete = function(){
    // jeśli usunęliśmy ostatnią kartę, resetujemy indeks
    if(currentIndex >= cards.length){
      currentIndex = 0;
    }
    loadCardsFromDB(renderList);
  };
}



/* ===============================
   LIST
================================ */

function renderList(){

const list = document.getElementById("wordsList")

const search = document
.getElementById("searchBox")
.value
.trim()
.toLowerCase()

list.innerHTML = ""

let arr = [...cards]

/* FILTR WYSZUKIWANIA */

if(search){

arr = arr.filter(card =>
card.front.toLowerCase().includes(search) ||
card.back.toLowerCase().includes(search)
)

}

/* SORTOWANIE */

if(sortAZ){
arr.sort((a,b)=>a.front.localeCompare(b.front,"pl"))
}

/* RENDER */

arr.forEach((card,index)=>{

const div=document.createElement("div")

div.className="listItem"

div.innerHTML=`

<div class="text"><b>${card.front}</b> - ${card.back}</div>

<div>
<button class="smallBtn primary" onclick="editCard(${cards.findIndex(c=>c.id===card.id)})">Edytuj</button>
<button class="smallBtn secondary" onclick="deleteCard(${cards.findIndex(c=>c.id===card.id)})">Usuń</button>
</div>

`

list.appendChild(div)

})

}


function toggleSort(){

sortAZ=!sortAZ

renderList()

}


	function openAll(){

setMode("ALL")

setView("homeStudy")

}

/* ===============================
   EDIT
================================ */

let editingIndex = null

function editCard(index){

editingIndex = index

document.getElementById("editFront").value = cards[index].front
document.getElementById("editBack").value = cards[index].back

document.getElementById("modal").classList.add("show")}

function saveModal(){

    image: original.image,
    level: original.level,
    nextReview: original.nextReview
  };

/* ===============================
   RECORD AUDIO
================================ */

async function startRecording(){

// sprawdzenie obsługi
if(!navigator.mediaDevices || !window.MediaRecorder){
alert("Twoja przeglądarka nie obsługuje nagrywania audio")
return
}

try{

const stream = await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder = new MediaRecorder(stream)

audioChunks = []

let seconds = 0

document.getElementById("recordUI").style.display = "block"

const timer = setInterval(()=>{
seconds++
document.getElementById("recordTimer").innerText = seconds + " s"
},1000)

mediaRecorder.ondataavailable = event=>{
audioChunks.push(event.data)
}

mediaRecorder.onstop = () => {

clearInterval(timer)

document.getElementById("recordUI").style.display = "none"

const blob = new Blob(audioChunks,{type:"audio/mp4"});

if(blob.size === 0){
alert("Nagranie jest puste")
return
}

const reader = new FileReader()

reader.onloadend = function(){

recordedAudioBase64 = reader.result

console.log("Audio zapisane:", recordedAudioBase64)

showPopup("Nagranie zapisane 🎤")

}

reader.readAsDataURL(blob)

stream.getTracks().forEach(track => track.stop())

}

// start nagrywania
mediaRecorder.start();

// zatrzymanie po 3 sekundach
setTimeout(()=>{
if(mediaRecorder && mediaRecorder.state !== "inactive"){
mediaRecorder.stop()
}
},3000)

}catch(err){

console.error(err)

if(err.name === "NotAllowedError"){
alert("Nie udzielono dostępu do mikrofonu")
}
else{
alert("Nie można uruchomić nagrywania")
}

}

}
