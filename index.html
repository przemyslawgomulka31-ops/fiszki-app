<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7b5cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fiszki">
<title>Fiszki - poprawione UI</title>
<style>
/* ---------- BODY / GRADIENT ---------- */
:root{
  --accent1: #8f7bff;
  --accent2: #a89bff;
  --accent3: #c9c2ff;
  --accent4: #e6e3ff;
  --white: #ffffff;
  --card-bg: #ffffff;
  --muted: rgba(0,0,0,0.55);
}
*{box-sizing:border-box}
html, body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#8f7bff;}
body{
  padding-top: env(safe-area-inset-top);
  min-height:100dvh;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  color:#111;
  background: linear-gradient(180deg,var(--accent1) 0%,var(--accent2) 25%,var(--accent3) 55%,var(--accent4) 80%,var(--white) 100%);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
html{touch-action: manipulation;}
/* ---------- APP LAYOUT ---------- */
.app{max-width:420px;margin:0 auto;padding:22px;padding-bottom:160px;height:100dvh;position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.bottomControls{position:fixed;left:0;right:0;bottom:0;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:420px;margin:auto;background:linear-gradient(to top,rgba(230,227,255,0.95),rgba(230,227,255,0));backdrop-filter:blur(10px);}
.header{font-size:20px;font-weight:600;text-align:center;margin:50px 0 14px;color:#1b1635;}
/* ---------- STATS ---------- */
.stats{background: rgba(255,255,255,0.12);backdrop-filter: blur(6px);padding:12px 14px;border-radius:14px;margin-bottom:18px;font-size:14px;color: #14121a;display:flex;gap:12px;align-items:center;justify-content:space-between;}
.stats .left{display:flex;gap:10px;align-items:center}
.stats .stat{background: rgba(255,255,255,0.25);padding:6px 10px;border-radius:10px;display:flex;gap:8px;align-items:center;font-size:13px;color:#0b0720;box-shadow: 0 6px 18px rgba(43,24,120,0.06);}
/* ---------- CARD ---------- */
.card{background: var(--card-bg);color:#222;border-radius:20px;padding:20px;text-align:center;font-size:28px;font-weight:600;margin-bottom:18px;box-shadow:0 18px 40px rgba(51,41,112,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.card.animate { transform: translateY(-8px); opacity: 0.85;}
.navButtons{display:flex;gap:12px;}
.navButtons button{flex:1;min-height:48px;border-radius:28px;font-size:14px;margin-top: 10px;}
button{width:100%;padding:12px 14px;border:none;border-radius:28px;margin-top:10px;font-size:15px;cursor:pointer;transition: transform .12s ease, box-shadow .12s ease;box-shadow: 0 6px 18px rgba(99,58,255,0.08);}
button:active{ transform: translateY(1px); }
.bigButton{min-height:60px;font-size:18px;}
.primary{background: linear-gradient(135deg,#7b5cff,#9f7bff);color:white;font-weight:600;margin-top: 10px;}
.secondary{background: #ffffff;color: #6a4bff;font-weight:600;}
.topButtons{position:absolute;top:12px;left:22px;right:22px;display:flex;justify-content:space-between;gap:12px;z-index:20;}
.iconBtn{width:42px;height:42px;border-radius:12px;border:none;font-size:22px;background:rgba(255,255,255,0.25);backdrop-filter: blur(6px);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.listItem{background:#fff;color:#222;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow: 0 8px 22px rgba(31,20,100,0.04);}
.listItem .text { flex:1 }
.smallBtn{width:auto;padding:8px 12px;font-size:13px;border-radius:10px;margin-left:6px;}
input{width:100%;padding:12px;border-radius:12px;border:none;margin-bottom:10px;font-size:15px;box-shadow: 0 8px 16px rgba(17,12,30,0.03);}
.view{ display:none; }
.active{ display:block; }
.modal-backdrop{position:fixed;inset:0;background:rgba(10,8,20,0.45);display:none;align-items:center;justify-content:center;z-index:50;}
.modal-backdrop.show{display:flex;}
.modal{width:90%;max-width:420px;background: #fff;color:#111;border-radius:14px;padding:16px;box-shadow: 0 18px 50px rgba(14,9,40,0.4);}
.modal h3{ margin:0 0 8px 0 }
.modal .row{ margin-bottom:8px }
@media (max-width:420px){ .card{ padding:36px 14px; font-size:22px } .header{ font-size:18px } .stats{ font-size:13px } }
.card{ display:flex; justify-content:center; align-items:center; gap:10px; }
.speak{ cursor:pointer; font-size:26px; }
.record, .play{ cursor:pointer; font-size:24px; }
#imageResults{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0; }
#imageResults img { width:100%; border-radius:10px; cursor:pointer; }
#imageResults img:hover { transform:scale(1.05); }
#cardImage{ width:100%; max-height:220px; object-fit:cover; border-radius:16px; margin-bottom:10px; }
.modeBtn{ padding:8px 14px; border-radius:12px; border:none; background:rgba(255,255,255,0.3); font-weight:600; }
#startScreen{ position:fixed; top:0; left:0; right:0; bottom:0; display:flex; justify-content:center; align-items:center; background:linear-gradient(180deg,#8f7bff,#c9c2ff); z-index:9999; color:white; text-align:center; }
.startContent h1{ font-size:38px; margin:0; }
.tapText{ margin-top:20px; opacity:0.8; font-size:14px; }
.logo{ font-size:20px; max-width:90px; }
.logoFish{ width:80px; height:auto; display:block; margin:auto; }
.tap{ margin-top:20px; opacity:0.6; font-size:14px; }
.studyOnly{ display:none; }
.tiles{ display:grid; grid-template-columns:1fr; gap:16px; margin-top:30px; }
.bigTile{ height:140px; width:70%; margin:auto; border-radius:20px; background:rgba(255,255,255,0.3); backdrop-filter:blur(6px); display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:36px; font-weight:600; box-shadow:0 12px 30px rgba(0,0,0,0.08); cursor:pointer; }
.bigTile span{ font-size:16px; margin-top:6px; letter-spacing:1px; }
.menuTitle{ text-align:center; font-size:22px; font-weight:700; margin-top:60px; margin-bottom:10px; letter-spacing:3px; color:#2b2250; }
.questionCard{ margin-top:80px; background:#fff; border-radius:20px; padding:20px; font-size:clamp(18px,4vw,28px); line-height:1.4; word-break:break-word; display:flex; align-items:center; justify-content:center; min-height:200px; box-shadow:0 18px 40px rgba(51,41,112,0.08); }
.questionSpacer{ height:20px; }
.questionField, .answerField{ width:100%; font-size:18px; line-height:1.5; padding:14px; border-radius:14px; border:none; box-shadow:0 8px 20px rgba(0,0,0,0.05); resize:none; }
.questionField{ min-height:80px; margin-bottom:12px; }
.answerField{ min-height:160px; margin-bottom:20px; }
</style>
</head>
<body>

<div id="startScreen">
  <div class="startContent">
    <div class="logo"><img src="fishki-logo.png" class="logoFish" alt=""></div>
    <h1>Fishki</h1>
    <p>Learn faster with flashcards</p>
    <div class="tapText">Dotknij aby rozpocząć</div>
  </div>
</div>

<div class="app">

  <div class="header"></div>

  <div class="topButtons">
    <button class="iconBtn" onclick="goHome()">🏠</button>
    <button id="btnBack" class="iconBtn" title="Cofnij">◀</button>
    <button id="btnList" class="iconBtn left" onclick="goToList()">📋</button>
    <button id="btnAdd" class="iconBtn right" onclick="goToAdd()">➕</button>
    <button id="btnAll" class="modeBtn studyOnly" onclick="setMode('ALL')">ALL</button>
    <button id="btnSrs" class="modeBtn studyOnly" onclick="setMode('SRS')">SRS</button>
  </div>

  <!-- HOME -->
  <div id="home" class="view active">
    <div class="menuTitle">MENU</div>
    <div class="tiles">
      <div class="tile bigTile" onclick="openAll()">📚<span>FISZKI</span></div>
      <div class="tile bigTile" onclick="openQuestions()">❓<span>QUESTION</span></div>
    </div>
  </div>

  <!-- FLASHCARDS STUDY -->
  <div id="homeStudy" class="view">
    <div class="stats">
      <div class="left"><div class="stat">🔥 Liczba: <strong id="counter">0</strong></div></div>
      <div style="font-size:13px;color:rgba(11,8,16,0.6)">Progres: <span id="progress-mini">—</span></div>
    </div>

    <div class="card" id="flashcard">
      <img id="cardImage" alt="">
      <span id="cardText">Dodaj pierwszą fiszkę</span>
      <span class="speak" onclick="dueCards.length && speakWord(dueCards[currentIndex].front)">🔊</span>
      <span class="play" onclick="playRecording()">▶️</span>
    </div>

    <div id="reviewButtons">
      <button onclick="reviewCard(0)">❌ Nie pamiętam</button>
      <button onclick="reviewCard(1)">🙂 Średnio</button>
      <button onclick="reviewCard(2)">✅ Łatwe</button>
    </div>
  </div>

  <!-- QUESTIONS FOLDERS -->
  <div id="questions" class="view">
    <h3>Foldery</h3>
    <div id="questionFolders"></div>
    <button class="primary" onclick="openFolderPopup()">➕ Nowy folder</button>
    <div style="display:flex;gap:10px">
      <button class="secondary" onclick="exportQuestions()">⬇ Export</button>
      <button class="secondary" onclick="document.getElementById('importQuestions').click()">⬆ Import</button>
    </div>
    <input type="file" id="importQuestions" accept=".json" style="display:none">
    <button class="secondary" onclick="goHome()">Powrót</button>
  </div>

  <!-- QUESTION FOLDER -->
  <div id="questionFolder" class="view">
    <h3>Pytania</h3>
    <div id="questionList"></div>
  </div>

  <!-- QUESTION CARDS -->
  <div id="questionCards" class="view">
    <div class="questionCard" id="questionCardText"></div>
  </div>

  <!-- ADD QUESTION -->
  <div id="addQuestion" class="view">
    <h3>Nowe pytanie</h3>
    <label>Pytanie</label>
    <textarea class="questionField" id="questionInput" placeholder="Np. What did you do last weekend?"></textarea>
    <label>Odpowiedź</label>
    <textarea class="answerField" id="answerInput" placeholder="Twoja odpowiedź (może być nawet 80 słów)"></textarea>
    <button class="primary" onclick="saveQuestion()">Zapisz</button>
    <button class="secondary" onclick="setView('questionFolder')">Powrót</button>
  </div>

  <!-- LIST -->
  <div id="list" class="view">
    <h3>Lista słówek</h3>
    <div style="margin:8px 0 12px">
      <input id="searchBox" placeholder="Szukaj..." oninput="renderList()" />
    </div>
    <div id="wordsList"></div>
    <div style="display:flex;gap:10px">
      <button class="secondary" onclick="toggleSort()">Sortuj A→Z</button>
      <button class="secondary" onclick="goHome()">Powrót</button>
      <button class="secondary" onclick="exportBackup()">Eksportuj kopię zapasową</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="secondary" onclick="document.getElementById('importFile').click()">Importuj</button>
    </div>
  </div>

  <!-- ADD FLASHCARD -->
  <div id="add" class="view">
    <h3>Dodaj fiszkę</h3>
    <input type="text" id="frontInput" placeholder="Słowo po angielsku">
    <input type="text" id="backInput" placeholder="Tłumaczenie">
    <input type="file" id="imageUpload" accept="image/*">
    <label for="imageUpload">📷 Dodaj własne zdjęcie</label>
    <div id="imageResults"></div>
    <button class="secondary" onclick="startRecording()">🎤 Nagraj wymowę</button>
    <button class="secondary" onclick="playRecording()">▶️ Odsłuch nagrania</button>
    <div id="recordUI" style="display:none;text-align:center;margin-top:10px">
      <div style="font-size:22px">🎤 Nagrywanie...</div>
      <div style="font-size:28px;color:red">● REC</div>
      <div id="recordTimer">0</div>
    </div>
    <button class="primary" onclick="addCard()">Dodaj fiszkę</button>
    <button class="secondary" onclick="goHome()">Powrót</button>
  </div>

  <!-- EDIT MODAL -->
  <div id="modal" class="modal-backdrop">
    <div class="modal">
      <h3>Edytuj słówko</h3>
      <div class="row"><input id="editFront" placeholder="Słowo po angielsku" /></div>
      <div class="row"><input id="editBack" placeholder="Tłumaczenie" /></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="secondary" onclick="closeModal()">Anuluj</button>
        <button class="primary" onclick="saveModal()">Zapisz</button>
      </div>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popup" class="modal-backdrop">
    <div class="modal">
      <h3 id="popupText"></h3>
      <button class="primary" onclick="closePopup()">OK</button>
    </div>
  </div>

</div>

<div id="folderPopup" class="modal-backdrop">
  <div class="modal">
    <h3>Nazwa folderu</h3>
    <input id="folderNameInput" placeholder="Np. Interview">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="secondary" onclick="closeFolderPopup()">Anuluj</button>
      <button class="primary" onclick="saveFolder()">Zapisz</button>
    </div>
  </div>
</div>

<script>
/* ===============================
   CACHE DOM
   ============================== */
const el = {
  topButtons: document.querySelector('.topButtons'),
  btnBack: document.getElementById('btnBack'),
  btnList: document.getElementById('btnList'),
  btnAdd: document.getElementById('btnAdd'),
  btnAll: document.getElementById('btnAll'),
  btnSrs: document.getElementById('btnSrs'),
  cardText: document.getElementById('cardText'),
  cardImage: document.getElementById('cardImage'),
  counter: document.getElementById('counter'),
  progressMini: document.getElementById('progress-mini'),
  imageResults: document.getElementById('imageResults'),
  startScreen: document.getElementById('startScreen'),
  recordUI: document.getElementById('recordUI'),
  recordTimer: document.getElementById('recordTimer')
};

/* ===============================
   STATE
   ============================== */
let db;
let cards = [];
let currentIndex = 0;
let showingAnswer = false;
let sortAZ = true;
let studyMode = "SRS";
let mediaRecorder;
let audioChunks = [];
let recordedAudioBase64 = null;
let imageURL = null;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastStudy = localStorage.getItem("lastStudy") || "";
let currentFolderId = null;

/* ===============================
   INDEXEDDB (upgrade & open)
   ============================== */
const request = indexedDB.open("FlashcardsDB", 2);

request.onupgradeneeded = function(event){
  db = event.target.result;

  if(!db.objectStoreNames.contains("cards")){
    db.createObjectStore("cards",{keyPath:"id",autoIncrement:true});
  }

  if(!db.objectStoreNames.contains("questionFolders")){
    db.createObjectStore("questionFolders",{keyPath:"id",autoIncrement:true});
  }

  if(!db.objectStoreNames.contains("questions")){
    const qStore = db.createObjectStore("questions",{keyPath:"id",autoIncrement:true});
    // index by folderId for fast queries per-folder
    qStore.createIndex("folderId","folderId",{unique:false});
  } else {
    // existing DB — if index missing, try to create it (safe in most upgrade scenarios)
    try {
      const tx = event.target.transaction;
      const qStore = tx.objectStore("questions");
      if(!qStore.indexNames.contains("folderId")){
        qStore.createIndex("folderId","folderId",{unique:false});
      }
    } catch(e){
      // ignore; index creation may not be allowed here if store already existed in older versions
      // it's OK — queries will still work but be slightly slower
      console.warn('Upgrade: could not create index (may already exist).', e);
    }
  }
};

request.onsuccess = function(event){
  db = event.target.result;
  loadCardsFromDB();
};

request.onerror = function(e){
  console.error("IndexedDB error", e);
};

/* ===============================
   LOAD CARDS (cache in memory)
   ============================== */
function loadCardsFromDB(callback){
  if(!db) return;
  const transaction = db.transaction("cards","readonly");
  const store = transaction.objectStore("cards");
  const req = store.getAll();
  req.onsuccess = function(){
    cards = req.result || [];
    renderCard();
    if(callback) callback();
  };
}

/* ===============================
   NAVIGATION / VIEW CONTROL
   ============================== */
function goHome(){ setView("home"); }
function goToList(){ setView("list"); renderList(); }
function goToAdd(){ setView("add"); }

function setView(view){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  const target = document.getElementById(view);
  if(target) target.classList.add("active");

  // bind back
  el.btnBack.onclick = goBack;

  // HOME
  if(view === "home"){
    el.topButtons.style.display = "none";
    return;
  }

  // show topbar for other views
  el.topButtons.style.display = "flex";

  // reset button visibility
  el.btnBack.style.display = "flex";
  el.btnList.style.display = "none";
  el.btnAdd.style.display = "none";
  el.btnAll.style.display = "none";
  el.btnSrs.style.display = "none";

  /* FISZKI: homeStudy, list, add */
  if(view === "homeStudy" || view === "list" || view === "add"){
    el.btnList.style.display = "flex";
    el.btnAdd.style.display = "flex";
    el.btnAll.style.display = "flex";
    el.btnSrs.style.display = "flex";
    el.btnList.onclick = goToList;
    el.btnAdd.onclick = goToAdd;
    el.btnAll.onclick = () => setMode("ALL");
    el.btnSrs.onclick = () => setMode("SRS");
    return;
  }

  /* FOLDERS VIEW (list of folders) - only home + back */
  if(view === "questions"){
    // only back and home visible (btnList/btnAdd hidden)
    el.btnList.style.display = "none";
    el.btnAdd.style.display = "none";
    el.btnAll.style.display = "none";
    el.btnSrs.style.display = "none";
    return;
  }

  /* Selected folder: provide List/Add/All functionality */
  if(view === "questionFolder"){
    el.btnList.style.display = "flex";
    el.btnAdd.style.display = "flex";
    el.btnAll.style.display = "flex";
    el.btnList.onclick = () => { renderQuestionList(); setView('questionFolder'); };
    el.btnAdd.onclick = goToAddQuestion;
    el.btnAll.onclick = openQuestionCards;
    return;
  }

  /* question cards view - only back + home */
  if(view === "questionCards"){
    // leave only back
    el.btnList.style.display = "none";
    el.btnAdd.style.display = "none";
    el.btnAll.style.display = "none";
    el.btnSrs.style.display = "none";
    return;
  }

  /* addQuestion view - back + home */
  if(view === "addQuestion"){
    el.btnList.style.display = "none";
    el.btnAdd.style.display = "none";
    el.btnAll.style.display = "none";
    el.btnSrs.style.display = "none";
    return;
  }
}

/* Back button behavior in SPA */
function goBack(){
  // if studying, go to previous card
  if(document.getElementById("homeStudy").classList.contains("active")){
    prevCard();
    return;
  }
  // if viewing question cards, move to previous question
  if(document.getElementById("questionCards").classList.contains("active")){
    questionIndex = (questionIndex - 1 + questionCards.length) % questionCards.length;
    questionAnswerVisible = false;
    renderQuestionCard();
    return;
  }
  // if in folder list, go to questions list view -> home
  if(document.getElementById("questionFolder").classList.contains("active")){
    setView("questions");
    return;
  }
  // default go home
  setView("home");
}

/* ===============================
   STUDY MODE
   ============================== */
function setMode(mode){
  studyMode = mode;
  currentIndex = 0;
  setView("homeStudy");
  renderCard();
}

/* ===============================
   RENDER / REVIEW CARD
   ============================== */
let dueCards = [];

function renderCard(){
  // build dueCards
  if(studyMode === "ALL"){
    dueCards = cards;
  } else {
    const now = Date.now();
    dueCards = cards.filter(c => !c.nextReview || c.nextReview <= now);
  }

  // no cards
  if(cards.length === 0){
    currentIndex = 0;
    el.cardText.innerText = "Dodaj pierwszą fiszkę";
    el.counter.innerText = 0;
    el.progressMini.innerText = "—";
    el.cardImage.style.display = "none";
    return;
  }

  if(dueCards.length === 0){
    currentIndex = 0;
    el.cardText.innerText = "Brak fiszek do powtórki 🎉";
    el.progressMini.innerText = "0 / 0";
    el.cardImage.style.display = "none";
    return;
  }

  if(currentIndex >= dueCards.length) currentIndex = 0;
  const card = dueCards[currentIndex];
  el.cardText.innerText = showingAnswer ? card.back : card.front;

  updateCounter();
  el.progressMini.innerText = (currentIndex + 1) + " / " + dueCards.length;

  if(card.image){
    el.cardImage.src = card.image;
    el.cardImage.style.display = "block";
  } else {
    el.cardImage.style.display = "none";
  }

  const reviewUI = document.getElementById("reviewButtons");
  if(studyMode === "ALL") reviewUI.style.display = "none"; else reviewUI.style.display = "block";

  // small card animation
  const flashcard = document.getElementById('flashcard');
  flashcard && flashcard.classList.add('animate');
  setTimeout(()=> flashcard && flashcard.classList.remove('animate'), 150);
}

function reviewCard(score){
  updateStreak();
  const card = dueCards[currentIndex];
  const intervals = [1,3,7,14,30]; // days
  if(score === 0) card.level = 0;
  else card.level = Math.min((card.level||0) + 1, intervals.length - 1);
  card.nextReview = Date.now() + intervals[card.level] * 24*60*60*1000;
  const tx = db.transaction("cards","readwrite");
  tx.objectStore("cards").put(card);
  tx.oncomplete = () => { nextCard(); loadCardsFromDB(); };
}

function nextCard(){
  if(dueCards.length === 0) return;
  currentIndex = (currentIndex + 1) % dueCards.length;
  showingAnswer = false;
  renderCard();
}
function prevCard(){
  if(dueCards.length === 0) return;
  currentIndex = (currentIndex - 1 + dueCards.length) % dueCards.length;
  showingAnswer = false;
  renderCard();
}
function showAnswer(){
  if(cards.length===0) return;
  showingAnswer = !showingAnswer;
  renderCard();
}

/* ===============================
   ADD / COMPRESS IMAGE / SEARCH
   ============================== */
async function compressImage(file, quality = 0.6){
  const imageBitmap = await createImageBitmap(file);
  const canvas = document.createElement('canvas');
  const maxWidth = 800;
  let width = imageBitmap.width;
  let height = imageBitmap.height;
  if(width > maxWidth){ height = height * (maxWidth / width); width = maxWidth; }
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(imageBitmap, 0, 0, width, height);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
  return await new Promise(res => {
    const reader = new FileReader();
    reader.onloadend = () => res(reader.result);
    reader.readAsDataURL(blob);
  });
}

   ============================== */
function speakWord(text){
  if(!text) return;
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speech.rate = 0.9;
  speechSynthesis.speak(speech);
}

async function startRecording(){
  if(!navigator.mediaDevices || !window.MediaRecorder){ alert("Twoja przeglądarka nie obsługuje nagrywania audio"); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    let seconds = 0;
    el.recordUI.style.display = "block";
    const timer = setInterval(()=>{ seconds++; el.recordTimer.innerText = seconds + " s"; },1000);
    mediaRecorder.ondataavailable = event=> audioChunks.push(event.data);
    mediaRecorder.onstop = () => {
      clearInterval(timer);
      el.recordUI.style.display = "none";
      const blob = new Blob(audioChunks,{type:"audio/mp4"});
      if(blob.size === 0){ alert("Nagranie jest puste"); return; }
      const reader = new FileReader();
      reader.onloadend = function(){ recordedAudioBase64 = reader.result; showPopup("Nagranie zapisane 🎤"); };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(track => track.stop());
    };
    mediaRecorder.start();
    setTimeout(()=>{ if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); },3000);
  } catch(err){
    console.error(err);
    if(err.name === "NotAllowedError") alert("Nie udzielono dostępu do mikrofonu");
    else alert("Nie można uruchomić nagrywania");
  }
}

function playRecording(){
  if(recordedAudioBase64){
    const audio = new Audio(recordedAudioBase64);
    audio.play().catch(err=>{ console.error(err); alert("Nie można odtworzyć nagrania"); });
    return;
  }
  if(!dueCards || dueCards.length === 0){ alert("Brak fiszek"); return; }
  const card = dueCards[currentIndex];
  if(!card){ alert("Błąd odczytu fiszki"); return; }
  if(card.audio){ const audio = new Audio(card.audio); audio.play().catch(err=>{ console.error(err); alert("Nie można odtworzyć nagrania"); }); return; }
  alert("Ta fiszka nie ma nagrania");
}

  const s = t.objectStore("questionFolders");
  const r = s.getAll();

    const folders = r.result || [];
    // compute counts once (fast)
    const qTx = db.transaction("questions","readonly");
    const qStore = qTx.objectStore("questions");
    // if index exists, use it to get all questions faster
    const getAllQuestionsReq = qStore.getAll();

      folders.forEach(folder=>{

        div.className = "listItem";
        div.innerHTML = `

        const count = allQuestions.filter(q => q.folderId === folder.id).length;

  const tx = db.transaction("questions","readwrite");

  if(editingQuestionId){
    store.put({ id: editingQuestionId, folderId: currentFolderId, question, answer });
    editingQuestionId = null;
  } else {

  tx.oncomplete = () => {
    document.getElementById("questionInput").value = "";
    document.getElementById("answerInput").value = "";
    setView("questionFolder");
    renderQuestionList();
  };
}

function importQuestions(file){
  const reader = new FileReader();
  reader.onload = function(e){
    let data;
    try{ data = JSON.parse(e.target.result); } catch { alert("Błędny plik"); return; }
    const t1 = db.transaction("questionFolders","readwrite"); t1.objectStore("questionFolders").clear();
    const t2 = db.transaction("questions","readwrite"); t2.objectStore("questions").clear();
    t2.oncomplete = function(){
      const folderMap = {};
      const tf = db.transaction("questionFolders","readwrite"); const sf = tf.objectStore("questionFolders");
      data.folders.forEach(oldFolder=>{
        const oldId = oldFolder.id; delete oldFolder.id;
        const req = sf.add(oldFolder);
        req.onsuccess = function(){ folderMap[oldId] = req.result; };
      });
      tf.oncomplete = function(){
        const tq = db.transaction("questions","readwrite"); const sq = tq.objectStore("questions");
        data.questions.forEach(q=>{
          delete q.id;
          q.folderId = folderMap[q.folderId];
          sq.add(q);
        });
        tq.oncomplete = function(){ renderFolders(); showPopup("Import zakończony"); };
      };
    };
  };
  reader.readAsText(file);
}

function updateStreak(){
  const today = new Date().toDateString();
  if(lastStudy !== today){
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if(lastStudy === yesterday) streak++; else streak = 1;
    lastStudy = today;
    localStorage.setItem("streak",streak);
    localStorage.setItem("lastStudy",today);
  }
  updateCounter();
}
