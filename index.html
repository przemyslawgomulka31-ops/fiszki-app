<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b5cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fiszki">
<title>Fiszki - poprawione UI</title>
<style>
/* ---------- BODY / GRADIENT ---------- */
:root{
  --accent1: #8f7bff;
  --accent2: #a89bff;
  --accent3: #c9c2ff;
  --accent4: #e6e3ff;
  --white: #ffffff;
  --card-bg: #ffffff;
  --muted: rgba(0,0,0,0.55);
}

*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  color: #111;
  background:
    linear-gradient(
      180deg,
      var(--accent1) 0%,
      var(--accent2) 25%,
      var(--accent3) 55%,
      var(--accent4) 80%,
      var(--white) 100%
    );
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
html {
    touch-action: manipulation;
}

/* ---------- APP LAYOUT ---------- */
.app{
  max-width:420px;
  margin:0 auto;
  padding:22px;
  min-height:100vh;
}

/* ---------- HEADER ---------- */
.header{
  font-size:20px;
  font-weight:600;
  text-align:center;
  margin:6px 0 14px;
  color:#1b1635;
}

/* ---------- STATS ---------- */
.stats{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  padding:12px 14px;
  border-radius:14px;
  margin-bottom:18px;
  font-size:14px;
  color: #14121a;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}
.stats .left{display:flex;gap:10px;align-items:center}
.stats .stat{
  background: rgba(255,255,255,0.25);
  padding:6px 10px;
  border-radius:10px;
  display:flex;
  gap:8px;
  align-items:center;
  font-size:13px;
  color:#0b0720;
  box-shadow: 0 6px 18px rgba(43,24,120,0.06);
}

/* ---------- CARD ---------- */
.card{
  background: var(--card-bg);
  color: #222;
  border-radius:20px;
  padding:40px;
	min-hight:200px;
  text-align:center;
  font-size:clamp (24px,5vw,34px);
	 display:flex;
  margin-bottom:120px;
  box-shadow: 0 18px 40px rgba(51,41,112,0.08);
  transition: transform .28s cubic-bezier(.2,.9,.25,1), opacity .2s;
}

/* animation helper (apply when switching card) */
.card.animate {
  transform: translateY(-8px);
  opacity: 0.85;
}

/* ---------- NAV BUTTONS (Prev/Next) ---------- */
.navButtons{
  display:flex;
  gap:12px;
	position:fixed;
	bottom:40px;
	left:20px;
		right:20px;
  margin-bottom:10px;
}
.navButtons button{
  flex:1;
  min-height:48px;
  border-radius:28px;
  font-size:14px;
margin-top: 10px;
}

/* ---------- BUTTONS ---------- */
button{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:28px;
  margin-top:10px;
  font-size:15px;
  cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  box-shadow: 0 6px 18px rgba(99,58,255,0.08);
}
button:active{ transform: translateY(1px); }


.primary{
  background: linear-gradient(135deg,#7b5cff,#9f7bff);
  color:white;
  font-weight:600;
	margin-top:32vh;
margin-bottom:50px;
	min-hight:56px;
	front-size:16px;
}


.secondary{
  background: #ffffff;
  color: #6a4bff;
  font-weight:600;
}
.topButtons{
position:absolute;
top:12px;
left:0;
right:0;
}

.iconBtn{
position:absolute;
width:10vw;
height:10vw;
max-width:42px;
max-height:42px;
border-radius:12px;
border:none;
font-size:22px;
background:rgba(255,255,255,0.25);
backdrop-filter: blur(6px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.iconBtn.left{
left:5%;
}

.iconBtn.right{
right:5%;
}

/* ---------- LIST ---------- */
.listItem{
  background:#fff;
  color:#222;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  box-shadow: 0 8px 22px rgba(31,20,100,0.04);
}
.listItem .text { flex:1 }
.smallBtn{
  width:auto;
  padding:8px 12px;
  font-size:13px;
  border-radius:10px;
  margin-left:6px;
}

/* ---------- INPUT ---------- */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  font-size:15px;
  box-shadow: 0 8px 16px rgba(17,12,30,0.03);
}

/* ---------- VIEW CONTROL ---------- */
.view{ display:none; }
.active{ display:block; }

/* ---------- MODAL (EDIT) ---------- */
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(10,8,20,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.modal-backdrop.show{
  display:flex;
}
.modal{
  width:90%;
  max-width:420px;
  background: #fff;
  color:#111;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 18px 50px rgba(14,9,40,0.4);
}
.modal h3{ margin:0 0 8px 0 }
.modal .row{ margin-bottom:8px }

/* small responsive tweaks */
@media (max-width:420px){
  .card{ padding:36px 14px; font-size:22px }
  .header{ font-size:18px }
  .stats{ font-size:13px }
}

.card{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.speak{
  cursor:pointer;
  font-size:26px;
}
.record,
.play{
  cursor:pointer;
  font-size:24px;
}

</style>
</head>
<body>
<div class="app">
  <div class="header">FiSZkAAA</div>
  <div class="topButtons">

	<button class="iconBtn left" onclick="goToList()">📋</button>

	<button class="iconBtn right" onclick="goToAdd()">➕</button>

</div>

  <!-- HOME -->
<div id="home" class="view active">

<div class="stats">
<div class="left">
<div class="stat">🔥 Liczba: <strong id="counter">0</strong></div>
</div>

<div style="font-size:13px;color:rgba(11,8,16,0.6)">
Progres: <span id="progress-mini">—</span>
</div>

</div>

<div class="card">

<span id="cardText">Dodaj pierwszą fiszkę</span>

<span class="speak" onclick="speakWord(cards[currentIndex].front)">🔊</span>

<span class="play" onclick="playRecording()">▶️</span>

</div>

<button class="primary" onclick="showAnswer()">Pokaż odpowiedź</button>

<div class="navButtons">
<button class="secondary" onclick="prevCard()">Poprzednia</button>
<button class="secondary" onclick="nextCard()">Następna</button>
</div>

</div>


  <!-- LIST -->
  <div id="list" class="view">
    <h3>Lista słówek</h3>
    <div style="margin:8px 0 12px">
      <input id="searchBox" placeholder="Szukaj..." oninput="renderList()" />
    </div>
    <div id="wordsList"></div>
    <div style="display:flex;gap:10px">
      <button class="secondary" onclick="toggleSort()">Sortuj A→Z</button>
      <button class="secondary" onclick="goHome()">Powrót</button>
	<button class="secondary" onclick="exportBackup()">Eksportuj kopię zapasową</button>
	<input type="file" id="importFile" accept=".json" style="display:none">
	<button class="secondary" onclick="document.getElementById('importFile').click()">Importuj</button>
    </div>
  </div>

  <!-- ADD -->
 <div id="add" class="view">

<h3>Dodaj fiszkę</h3>

<input type="text" id="frontInput" placeholder="Słowo po angielsku">

<input type="text" id="backInput" placeholder="Tłumaczenie">

<button class="secondary" onclick="startRecording()">🎤 Nagraj wymowę</button>

<button class="secondary" onclick="playRecording()">▶️ Odsłuch nagrania</button>

<div id="recordUI" style="display:none;text-align:center;margin-top:10px">

<div style="font-size:22px">🎤 Nagrywanie...</div>

<div style="font-size:28px;color:red">● REC</div>

<div id="recordTimer">0</div>

</div>

<button class="primary" onclick="addCard()">Dodaj fiszkę</button>

<button class="secondary" onclick="goHome()">Powrót</button>


</div>

<!-- EDIT MODAL -->
<div id="modal" class="modal-backdrop" role="dialog" aria-hidden="true">
  <div class="modal" role="document">
    <h3>Edytuj słówko</h3>
    <div class="row"><input id="editFront" placeholder="Słowo po angielsku" /></div>
    <div class="row"><input id="editBack" placeholder="Tłumaczenie" /></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="secondary" onclick="closeModal()">Anuluj</button>
      <button class="primary" onclick="saveModal()">Zapisz</button>
    </div>
  </div>
</div>

<div id="popup" class="modal-backdrop">
  <div class="modal">
    <h3 id="popupText"></h3>
    <button class="primary" onclick="closePopup()">OK</button>
  </div>
</div>


<script>


/* ===============================
   INDEXED DB
================================ */

let db
let cards = []
let currentIndex = 0
let showingAnswer = false
let sortAZ = true

let mediaRecorder
let audioChunks = []
let recordedAudioBase64 = null


const request = indexedDB.open("FlashcardsDB",1)


request.onupgradeneeded = function(event){

db = event.target.result

db.createObjectStore("cards",{keyPath:"id",autoIncrement:true})

}


request.onsuccess = function(event){

db = event.target.result

loadCardsFromDB()

}


/* ===============================
   LOAD FROM DB
================================ */

function loadCardsFromDB(callback){

const transaction = db.transaction("cards","readonly")

const store = transaction.objectStore("cards")

const req = store.getAll()

req.onsuccess = function(){

cards = req.result

renderCard()

if(callback) callback()

}

}


/* ===============================
   NAVIGATION
================================ */

function goHome(){ setView("home") }
function goToList(){ setView("list"); renderList() }
function goToAdd(){ setView("add") }

function setView(view){

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))

document.getElementById(view).classList.add("active")

}


/* ===============================
   RENDER CARD
================================ */

const cardEl = document.getElementById("cardText")

function renderCard(){

if(cards.length===0){

cardEl.innerText="Dodaj pierwszą fiszkę"
return

}

cardEl.innerText = showingAnswer
? cards[currentIndex].back
: cards[currentIndex].front

document.getElementById("counter").innerText = cards.length

}


/* ===============================
   STUDY
================================ */

function showAnswer(){

if(cards.length===0)return

showingAnswer=true

renderCard()

}


function nextCard(){

if(cards.length===0)return

currentIndex=(currentIndex+1)%cards.length

showingAnswer=false

renderCard()

}


function prevCard(){

if(cards.length===0)return

currentIndex--

if(currentIndex<0) currentIndex = cards.length-1

showingAnswer=false

renderCard()

}


/* ===============================
   ADD CARD
================================ */

function addCard(){

const front=document.getElementById("frontInput").value.trim()
const back=document.getElementById("backInput").value.trim()

if(!front||!back){

alert("Wypełnij pola")

return

}

const newCard={
front:front,
back:back,
audio:recordedAudioBase64
}

const transaction=db.transaction("cards","readwrite")

const store=transaction.objectStore("cards")

store.add(newCard)

transaction.oncomplete=function(){

recordedAudioBase64=null

document.getElementById("frontInput").value=""
document.getElementById("backInput").value=""

loadCardsFromDB()

}

}


/* ===============================
   DELETE
================================ */
function deleteCard(index){

const id = cards[index].id

const transaction = db.transaction("cards","readwrite")

const store = transaction.objectStore("cards")

store.delete(id)

transaction.oncomplete = function(){

loadCardsFromDB(renderList)

}

}


/* ===============================
   LIST
================================ */

function renderList(){

const list = document.getElementById("wordsList")

const search = document
.getElementById("searchBox")
.value
.trim()
.toLowerCase()

list.innerHTML = ""

let arr = [...cards]

/* FILTR WYSZUKIWANIA */

if(search){

arr = arr.filter(card =>
card.front.toLowerCase().includes(search) ||
card.back.toLowerCase().includes(search)
)

}

/* SORTOWANIE */

if(sortAZ){
arr.sort((a,b)=>a.front.localeCompare(b.front,"pl"))
}

/* RENDER */

arr.forEach((card,index)=>{

const div=document.createElement("div")

div.className="listItem"

div.innerHTML=`

<div class="text"><b>${card.front}</b> - ${card.back}</div>

<div>
<button class="smallBtn primary" onclick="editCard(${cards.findIndex(c=>c.id===card.id)})">Edytuj</button>
<button class="smallBtn secondary" onclick="deleteCard(${cards.findIndex(c=>c.id===card.id)})">Usuń</button>
</div>

`

list.appendChild(div)

})

}


function toggleSort(){

sortAZ=!sortAZ

renderList()

}


/* ===============================
   EDIT
================================ */

let editingIndex = null

function editCard(index){

editingIndex = index

document.getElementById("editFront").value = cards[index].front
document.getElementById("editBack").value = cards[index].back

document.getElementById("modal").classList.add("show")}

function saveModal(){

const newFront = document.getElementById("editFront").value.trim()
const newBack = document.getElementById("editBack").value.trim()

if(!newFront || !newBack){

alert("Wypełnij pola")
return

}

const id = cards[editingIndex].id

const transaction = db.transaction("cards","readwrite")

const store = transaction.objectStore("cards")

store.put({
id:id,
front:newFront,
back:newBack,
audio:cards[editingIndex].audio
})

transaction.oncomplete = function(){

closeModal()
loadCardsFromDB()

}

}
function closeModal(){

document.getElementById("modal").classList.remove("show")

}

/* ===============================
   SPEECH
================================ */

function speakWord(text){

if(!text)return

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speech.rate=0.9

speechSynthesis.speak(speech)

}


/* ===============================
   RECORD AUDIO
================================ */

async function startRecording(){

try{

const stream = await navigator.mediaDevices.getUserMedia({ audio:true })

mediaRecorder = new MediaRecorder(stream)

audioChunks = []

let seconds = 0

document.getElementById("recordUI").style.display = "block"

const timer = setInterval(()=>{

seconds++
document.getElementById("recordTimer").innerText = seconds + " s"

},1000)


mediaRecorder.ondataavailable = event => {
audioChunks.push(event.data)
}


mediaRecorder.onstop = ()=>{

clearInterval(timer)

document.getElementById("recordUI").style.display = "none"

const blob = new Blob(audioChunks,{type:"audio/webm"})

const reader = new FileReader()

reader.onloadend = function(){

recordedAudioBase64 = reader.result

showPopup("Nagranie zapisane 🎤")

}

reader.readAsDataURL(blob)

}


mediaRecorder.start()

setTimeout(()=>{

mediaRecorder.stop()

},3000)

}
catch(err){

alert("Brak dostępu do mikrofonu")

}

}


/* ===============================
   PLAY AUDIO
================================ */

function playRecording(){

/* jeśli jesteśmy w dodawaniu fiszki */

if(recordedAudioBase64){

const audio = new Audio(recordedAudioBase64)

audio.play()

return

}

/* jeśli jesteśmy na zapisanej fiszce */

const card = cards[currentIndex]

if(!card || !card.audio){

alert("Brak nagrania")

return

}

const audio = new Audio(card.audio)

audio.play()

}




/* ===============================
   EXPORT
================================ */

function exportBackup(){

const data=JSON.stringify(cards)

const blob=new Blob([data],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url

a.download="fiszki-backup.json"

a.click()

}


/* ===============================
   IMPORT
================================ */

document.getElementById("importFile").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(ev){

const imported=JSON.parse(ev.target.result)

const transaction=db.transaction("cards","readwrite")

const store=transaction.objectStore("cards")

imported.forEach(card=>{
delete card.id
store.add(card)
})

transaction.oncomplete=function(){

loadCardsFromDB()

alert("Import OK")

}

}

reader.readAsText(file)

})

transaction.oncomplete = function(){

closeModal()
loadCardsFromDB()
renderList()
renderCard()

}

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker zarejestrowany"))
    .catch(err => console.log("Błąd SW:", err));
}

function showPopup(text){

document.getElementById("popupText").innerText=text

document.getElementById("popup").classList.add("show")

}

function closePopup(){

document.getElementById("popup").classList.remove("show")

}
</script>


</body>
</html>
